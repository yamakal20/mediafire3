<!doctype html>
<html lang="my">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Direct Link Extractor</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;padding:0 16px;background:#f7f8fa}
    h1{text-align:center;font-size:1.6rem}
    .box{background:#fff;border:1px solid #e3e6ea;border-radius:12px;padding:20px}
    input{width:100%;padding:12px;font-size:1rem;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
    button{margin-top:12px;width:100%;padding:12px;font-size:1rem;border:0;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
    button:disabled{opacity:.6}
    #result{margin-top:16px;word-break:break-all}
    .item{background:#eef2f7;border-radius:8px;padding:12px;margin-bottom:8px}
    .item a{color:#2563eb}
    .err{color:#c0392b}
  </style>
</head>
<body>
  <h1>🔗 Direct Link Extractor</h1>
  <div class="box">
    <input id="link" type="text" placeholder="MediaFire / MegaUp link ထည့်ပါ" autofocus>
    <button id="fire">🔥 Extract</button>
    <div id="result"></div>
  </div>
  <script>
    const btn = document.getElementById('fire');
    const out = document.getElementById('result');
    const inp = document.getElementById('link');

    async function go() {
      const url = inp.value.trim();
      if (!url) return;
      btn.disabled = true; btn.textContent = 'Working...'; out.innerHTML = '';
      try {
        const r = await fetch('/api/extract?url=' + encodeURIComponent(url));
        const data = await r.json();
        if (!r.ok || data.error) throw new Error(data.error || 'Failed');
        out.innerHTML = data.links.map(l =>
          `<div class="item"><a href="${l.url}" target="_blank" rel="noopener">${l.url}</a>
           ${l.filename ? '<br><small>📄 ' + l.filename + '</small>' : ''}</div>`
        ).join('') || '<div class="item err">Link မတွေ့ပါ</div>';
      } catch (e) {
        out.innerHTML = '<div class="item err">⚠️ ' + e.message + '</div>';
      } finally {
        btn.disabled = false; btn.textContent = '🔥 Extract';
      }
    }
    btn.onclick = go;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  </script>
</body>
</html>
